# v4 比赛对象几何配置。
# 单位统一为 SI；体积按 ml 记录，便于倒水任务直接使用。
schema_version: competition_object_geometry_v4
updated_at: "2026-04-20"

units:
  length: m
  mass: kg
  volume: ml
  density: kg_per_l

official_semantics:
  object_ids:
    - water_bottle
    - cola_bottle
    - cup
    - basketball
    - soccer_ball
    - basket
  aliases:
    yibao: water_bottle
    cestbon: water_bottle
    water: water_bottle
    cocacola: cola_bottle
    coke: cola_bottle
    cola: cola_bottle
    football: soccer_ball

common:
  pose_frame: world
  object_origin: bottom_center
  table_contact_epsilon_m: 0.005
  default_collision_padding_m: 0.01

objects:
  water_bottle:
    label_zh: 怡宝饮用水 350ml
    role: beverage
    source: official_with_modeling_proxy
    official:
      nominal_volume_ml: 350
      cap_state: previously_opened
    geometry:
      bounding_box_m: [0.060, 0.060, 0.175]
      main_axis: z
      proxy_shape:
        type: cylinder
        radius_m: 0.030
        height_m: 0.175
        center_z_m: 0.0875
      parts:
        body:
          type: cylinder
          radius_m: 0.030
          height_m: 0.140
          center_z_m: 0.070
        shoulder:
          type: frustum
          bottom_radius_m: 0.030
          top_radius_m: 0.015
          height_m: 0.022
          center_z_m: 0.151
        neck_cap:
          type: cylinder
          radius_m: 0.016
          height_m: 0.018
          center_z_m: 0.166
    mass:
      empty_kg: 0.023
      full_kg: 0.373
      liquid_density_kg_per_l: 1.00
    perception:
      expected_height_m: 0.175
      expected_diameter_m: 0.060
      color_hint: clear_pet
    planning:
      collision_proxy_shape: cylinder
      grasp_regions:
        body_mid_upper:
          z_range_m: [0.070, 0.120]
          preferred_gripper_width_m: 0.066
          approach_axes: [x, y]
          allowed_arms: [left_arm, right_arm]
      pour_reference:
        mouth_z_m: 0.175
        tilt_axis_candidates: [x, y]

