<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
</head>

<body>
    <div class="main" id="nodeEditor">
        <div id="left-panel">
            <div class="ne-slider-icon" id="slide-left-panel">
                <div style="margin-top: 1rem;">
                    <i class="fa fa-arrow-left"></i>
                </div>
            </div>
            <div class="left-panel-content">
                <div class="left-panel-tab" ng-bind="'_filename' | translate"></div>
                <div class="left-panel-file" style="width: 90%;padding: 10px;">
                    <input id="nodeEditorFileName" style="background-color: white !important;" ng-model="nodeEditorFileName" type="text" oninput="limitInput_special(this)" autocomplete="off">
                </div>
                <div id="add-variables" class="left-panel-tab" ng-bind="'_create_variables' | translate"><div id="add-variables-plus-icon"
                        style="position: absolute; right: 0.7rem; transition: 0.1s;"><i class="fa fa-chevron-down"></i></div>
                </div>
                <div id="add-variables-content" class="left-panel-tab-content">
                    <div id="create-variables">
                        <div class="ne-input-group">
                            <div class="icon2" ng-bind="'_type' | translate"></div>
                            <select class="form-control" id="variable-data-type">
                                <option value="Number" selected ng-bind="'_number' | translate"></option>
                                <option value="Boolean" ng-bind="'_boolean' | translate"></option>
                                <option value="String" ng-bind="'_string' | translate"></option>
                                <option value="Array" ng-bind="'_array' | translate"></option>
                            </select>
                        </div>
                        <div class="ne-input-group">
                            <div class="icon2" ng-bind="'_name' | translate"></div>
                            <input type="text" class="form-control" placeholder="Name" id="variable-name">
                        </div>
                        <div class="ne-input-group" id="number-default-form">
                            <div class="icon2" ng-bind="'_var_initial' | translate"></div>
                            <input type="number" class="form-control" placeholder="Default" title="enter number"
                                id="number-default-value" value=0>
                        </div>
                        <div class="ne-input-group hidden" id="string-default-form">
                            <div class="icon2" ng-bind="'_var_initial' | translate"></div>
                            <input type="text" class="form-control" placeholder="Default" title="enter string"
                                id="string-default-value" value=hello>
                        </div>
                        <div class="ne-input-group hidden" id="array-default-form">
                            <div class="icon2" ng-bind="'_var_initial' | translate"></div>
                            <input type="text" class="form-control" placeholder="Default"
                                title="enter array values in [1, 2, 3, 4] or ['Love', 'Shove', 'Dove'] or [true, false, true] etc format"
                                id="array-default-value" value=[]>
                        </div>
                        <div class="ne-input-group hidden" id="bool-default-form">
                            <div class="icon2" ng-bind="'_var_initial' | translate"></div>
                            <select class="form-control" id="bool-default-value">
                                <option value=true selected>True</option>
                                <option value=false>False</option>
                            </select>
                        </div>
                        <div class="text-center">
                            <a id="create-btn" class="btn btn-frblue">
                                <span aria-hidden="true" ng-bind="'_create' | translate"></span>
                            </a>
                        </div>
                    </div>
                </div>
                <div id="list-of-variables" class="left-panel-tab">
                    <span ng-bind="'_variable_list' | translate"></span>
                    <div id="list-of-variables-down-icon" style="position: absolute; right: 0.7rem; transition: 0.1s;">
                        <i class="fa fa-chevron-down"></i>
                    </div>
                </div>
                <div id="list-of-variables-content" class="left-panel-tab-content" style="width: 90%;">
                    <div class="variableList" style="width: 100%;">
                        <ul class="list-group list-group-flush" id="variable-list">
                        </ul>
                    </div>
                </div>
            </div>
        </div>
        <div id="container">

        </div>
        <div id="live-code-container" class="live-code-container live-code-closed">
            <div class="icons-live-code">
                <div id="live-code-arrow" ng-click="livaCodeArrow()"><i class="fa fa-arrow-left"></i></div>
                <div id="live-code-refresh" title="Ctrl+Q" ng-click="liveCodeRefresh()"><i class="fa fa-refresh"></i></div>
                <h4 style="margin-left: 2rem; color: yellowgreen; transform: translateY(2px);" ng-bind="'_code_translation' | translate"></h4>
            </div>
            <div id="live-code">

            </div>
        </div>

    </div>
    <div class="ne-leftbar">
        <button class="fr-node-editor-icon" id="Code" ng-click="openCode()">
            <i ng-attr-title="{{'_code' | translate}}" class="fa fa-code fa-lg icon-color"></i>
        </button>
        <button class="fr-node-editor-icon" id="import" ng-click="openImportMenu()">
            <i ng-attr-title="{{'_import' | translate}}" class="frfont frdaoru" aria-hidden="true"></i>
        </button>
        <button class="fr-node-editor-icon" id="export" ng-click="getNodeGraphNameList('export')">
            <i ng-attr-title="{{'_export' | translate}}" class="frfont frdaochu" aria-hidden="true"></i>
            <a id="exportAnchorElem"></a>
        </button>
        <button class="fr-node-editor-icon" id="starter" ng-click="starterNodeGraphContent()">
            <i ng-attr-title="{{'_initial' | translate}}" class="fa fa-refresh fa-lg icon-color"></i>
        </button>
        <button class="fr-node-editor-icon" id="refresh" ng-click="refreshNodeGraphContent()">
            <i ng-attr-title="{{'_new' | translate}}" class="frfont frxinjian" aria-hidden="true"></i>
        </button>
        <button class="fr-node-editor-icon" id="reload" ng-click="reloadNodeGraphContent()">
            <i ng-attr-title="{{'_overload' | translate}}" class="fa fa-reply fa-lg icon-color"></i>
        </button>
        <button class="fr-node-editor-icon" id="save" ng-click="saveNodeGraphContent()">
            <i ng-attr-title="{{'_save' | translate}}" class="frfont frbaocun" aria-hidden="true"></i>
        </button>
        <button class="fr-node-editor-icon" id="open" ng-click="getNodeGraphNameList('save')">
            <i ng-attr-title="{{'_open' | translate}}" class="frfont frdakai" aria-hidden="true"></i>
        </button>

    </div>
    <div id="saving" class="sidebox hidden">
        <div class="sidebox-flex">
            <div class="sidebox-flex-content" ng-bind="'_saving' | translate"></div>
        </div>
    </div>
    <div id="alert-box" class="sidebox hidden">
        <div class="sidebox-flex">
            <div class="sidebox-flex-content" ng-bind="'_export_current' | translate"></div>
            <button id="alert-ok-btn" class="node-editor-icon" ng-bind="'_confirm' | translate"></button>

    </div>
    <div id="refresh-box" class="sidebox hidden">
        <div class="sidebox-flex">
            <div class="sidebox-flex-content" ng-bind="'_current_will_be_lost' | translate"></div>
            <button id="refresh-btn" class="node-editor-icon" ng-bind="'_refresh' | translate" ng-click="refreshNodeFileName()"></button>
            <button id="refresh-cancel-btn" class="node-editor-icon" ng-bind="'_cancel' | translate"></button>
        </div>
    </div>

                    </a>
                </div>
                <div class="modal-body">
                    <span ng-bind="'_select_blockly_workspace' | translate"></span>：
                    <select ng-model="selectedNodeGraphName" ng-options="a for a in nodeGraphNameList"></select>
                </div>
                <div class="modal-footer">
                    <a id="btn_submit" class="btn btn-frgrey" ng-click="deleteNodeGraphFile()">
                        <span aria-hidden="true" ng-bind="'_delete' | translate"></span>
                    </a>
                    <a id="btn_submit" class="btn btn-frblue" ng-click="getNodeGraphContent()">
                        <span aria-hidden="true" ng-bind="'_load' | translate"></span>
                    </a>
                </div>
            </div>
        </div>
    </div>
    <!-- 导出节点编程内容弹出框 -->
    <div class="modal" aria-hidden="true" id="exportNodeGraphModal" tabindex="-1" role="dialog" aria-labelledby="exportNodeGraphLabel" data-backdrop="static">
        <div class="modal-dialog" role="document">
            <div class="modal-content file-operation-content">
                <div class="modal-header file-operation-header">
                    <span id="exportBlocklyWorkspaceLabel" ng-bind="'_export_node_graph' | translate"></span>
                    <a class="file-operation-close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </a>
                </div>
                <div class="modal-body">
                    <span ng-bind="'_select_blockly_workspace' | translate"></span>：
                    <select ng-model="selectedExportNodeGraphName" ng-options="a for a in nodeGraphNameList"></select>
                </div>
                <div class="modal-footer">
                    <a id="btn_submit" class="btn btn-frblue" ng-click="exportNodeGraph()">
                        <span aria-hidden="true" ng-bind="'_export' | translate"></span>
                    </a>
                </div>
            </div>
        </div>
    </div>
    <!-- 重载节点编程内容弹出框 -->
    <div class="modal" aria-hidden="true" id="reloadNodeGraphModal" tabindex="-1" role="dialog" aria-labelledby="reloadNodeGraphLabel" data-backdrop="static">
        <div class="modal-dialog" role="document">
            <div class="modal-content file-operation-content">
                <div class="modal-header file-operation-header">
                    <span id="exportBlocklyWorkspaceLabel" ng-bind="'_overload' | translate"></span>
                    <a class="file-operation-close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </a>
                </div>
                <div class="modal-body">
                    <div ng-bind="'_reload_last_save' | translate"></div>
                </div>
                <div class="modal-footer">
                    <button id="load-cancel-btn" class="btn btn-frgrey" ng-bind="'_cancel' | translate"></button>
                    <button id="load-btn" class="btn btn-frblue" ng-bind="'_load' | translate"></button>
                </div>
            </div>
        </div>
    </div>
    <!-- 新建节点编程内容弹出框 -->
    <div class="modal" aria-hidden="true" id="refreshNodeGraphModal" tabindex="-1" role="dialog" aria-labelledby="refreshNodeGraphLabel" data-backdrop="static">
        <div class="modal-dialog" role="document">
            <div class="modal-content file-operation-content">
                <div class="modal-header file-operation-header">
                    <span id="exportBlocklyWorkspaceLabel" ng-bind="'_new' | translate"></span>
                    <a class="file-operation-close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </a>
                </div>
                <div class="modal-body">
                    <div ng-bind="'_current_will_be_lost' | translate"></div>
                </div>
                <div class="modal-footer">
                    <a id="refresh-cancel-btn" class="btn btn-frgrey" data-dismiss="modal">
                        <span aria-hidden="true" ng-bind="'_cancel' | translate"></span>
                    </a>
                    <button id="refresh-btn" class="btn btn-frblue" ng-bind="'_refresh' | translate" ng-click="refreshOrStart('refresh')"></button>
                </div>
            </div>
        </div>
    </div>
    <!-- 初始节点编程内容弹出框 -->
    <div class="modal" aria-hidden="true" id="initialNodeGraphModal" tabindex="-1" role="dialog" aria-labelledby="initialNodeGraphLabel" data-backdrop="static">
        <div class="modal-dialog" role="document">
            <div class="modal-content file-operation-content">
                <div class="modal-header file-operation-header">
                    <span id="exportBlocklyWorkspaceLabel" ng-bind="'_initial' | translate"></span>
                    <a class="file-operation-close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </a>
                </div>
                <div class="modal-body">
                    <div ng-bind="'_current_will_be_lost' | translate"></div>
                </div>
                <div class="modal-footer">
                    <a id="refresh-cancel-btn" class="btn btn-frgrey" data-dismiss="modal">
                        <span aria-hidden="true" ng-bind="'_cancel' | translate"></span>
                    </a>
                    <button id="refresh-btn" class="btn btn-frblue" ng-bind="'_load' | translate" ng-click="refreshOrStart('initial')"></button>
                </div>
            </div>
        </div>
    </div>
    <!-- 导入节点编程弹出框 -->
    <div class="modal" aria-hidden="true" id="importNodeGraphModal" tabindex="-1" role="dialog" aria-labelledby="importNodeGraphLabel" data-backdrop="static">
        <div class="modal-dialog" role="document">
            <div class="modal-content file-operation-content">
                <div class="modal-header file-operation-header">
                    <span id="exportBlocklyWorkspaceLabel" ng-bind="'_import' | translate"></span>
                    <a class="file-operation-close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </a>
                </div>
                <div class="modal-body">
                    <input type="file" id="upload-json" accept=".json">
                </div>
                <div class="modal-footer">
                    <a id="refresh-cancel-btn" class="btn btn-frgrey" data-dismiss="modal">
                        <span aria-hidden="true" ng-bind="'_cancel' | translate"></span>
                    </a>
                    <a id="import-btn" class="btn btn-frblue" ng-click="uploadNodeGraphFile()">
                        <span aria-hidden="true" ng-bind="'_import' | translate"></span>
                    </a>
                </div>
            </div>
        </div>
    </div>
    <!-- 必须包含开始节点提示语弹出框 -->
    <div class="modal" aria-hidden="true" id="includeBeginModal" tabindex="-1" role="dialog" aria-labelledby="includeBeginLabel" data-backdrop="static">
        <div class="modal-dialog" role="document">
            <div class="modal-content file-operation-content">
                <div class="modal-header file-operation-header">
                    <span id="exportBlocklyWorkspaceLabel" ng-bind="'_code' | translate"></span>
                    <a class="file-operation-close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </a>
                </div>
                <div class="modal-body">
                    <div ng-bind="'_must_contain_start' | translate"></div>
                </div>
                <div class="modal-footer">
                    <a class="btn btn-frblue" data-dismiss="modal">
                        <span aria-hidden="true" ng-bind="'_confirm' | translate"></span>
                    </a>
                </div>
            </div>
        </div>
    </div>
    <!-- 存在多个开始节点提示语弹出框 -->
    <div class="modal" aria-hidden="true" id="multipleBeginModal" tabindex="-1" role="dialog" aria-labelledby="multipleBeginLabel" data-backdrop="static">
        <div class="modal-dialog" role="document">
            <div class="modal-content file-operation-content">
                <div class="modal-header file-operation-header">
                    <span id="exportBlocklyWorkspaceLabel" ng-bind="'_code' | translate"></span>
                    <a class="file-operation-close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </a>
                </div>
                <div class="modal-body">
                    <div ng-bind="'_multiple_begin' | translate"></div>
                </div>
                <div class="modal-footer">
                    <a class="btn btn-frblue" data-dismiss="modal">
                        <span aria-hidden="true" ng-bind="'_confirm' | translate"></span>
                    </a>
                </div>
            </div>
        </div>
    </div>
    <!-- 找不到上一次保存提示语弹出框 -->
    <div class="modal" aria-hidden="true" id="lastSaveModal" tabindex="-1" role="dialog" aria-labelledby="lastSaveLabel" data-backdrop="static">
        <div class="modal-dialog" role="document">
            <div class="modal-content file-operation-content">
                <div class="modal-header file-operation-header">
                    <span id="exportBlocklyWorkspaceLabel" ng-bind="'_overload' | translate"></span>
                    <a class="file-operation-close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </a>
                </div>
                <div class="modal-body">
                    <div ng-bind="'_no_previous_save' | translate"></div>
                </div>
                <div class="modal-footer">
                    <a class="btn btn-frblue" data-dismiss="modal">
                        <span aria-hidden="true" ng-bind="'_confirm' | translate"></span>
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
