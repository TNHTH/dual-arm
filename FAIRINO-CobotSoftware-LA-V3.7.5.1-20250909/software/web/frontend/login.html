<!DOCTYPE html>
<html ng-app="login" ng-controller="loginCtrl">
  <head>
    <meta http-equiv="Expires" content="0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Cache-control" content="no-cache,must-revalidate">
    <meta http-equiv="Cache" content="no-cache">
    
    <meta charset="utf-8">
    <meta name="google" content="notranslate">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title ng-bind="collaborativeRobotConsole"></title>
    <meta content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" name="viewport">
    <!-- Full Screen -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="msapplication-TileColor" content="#b91d47">
    <meta name="theme-color" content="#ffffff">
    
    <script type="text/javascript">
      document.write('<link rel="shortcut icon" type="image/x-icon" href="./file/odm/favicon.ico?v=' + new Date().getTime() + '">');
      document.write('<link rel="icon" type="image/png" sizes="32x32" href="./file/odm/favicon-32x32.png?v=' + new Date().getTime() + '">');
      document.write('<link rel="icon" type="image/png" sizes="16x16" href="./file/odm/favicon-16x16.png?v=' + new Date().getTime() + '">');
      document.write('<link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png?v=' + new Date().getTime() + '">');
      document.write('<link rel="manifest" href="./site.webmanifest?v=' + new Date().getTime() + '">');
      document.write('<link rel="mask-icon" color="#5bbad5" href="./safari-pinned-tab.svg?v=' + new Date().getTime() + '">');
      document.write('<link rel="stylesheet" href="./css/bootstrap.min.css?v=' + new Date().getTime() + '">');
      document.write('<link rel="stylesheet" href="./fonts/fontawesome/css/all.min.css?v=' + new Date().getTime() + '">');
      document.write('<link rel="stylesheet" href="./fonts/fontawesome/css/v4-shims.min.css?v=' + new Date().getTime() + '">');
      document.write('<link rel="stylesheet" href="./css/ionicons.min.css?v=' + new Date().getTime() + '">');
      document.write('<link rel="stylesheet" href="./css/AdminLTE.css?v=' + new Date().getTime() + '">');
      document.write('<link rel="stylesheet" href="./plugins/iCheck/square/blue.css?v=' + new Date().getTime() + '">');
      document.write('<link rel="stylesheet" href="./plugins/toastr/toastr.css?v=' + new Date().getTime() + '">');
      document.write('<script src="./js/angular.js?v=' + new Date().getTime() + '"><\/script>');
      document.write('<script src="./js/jquery.min.js?v=' + new Date().getTime() + '"><\/script>');
      document.write('<script src="./js/bootstrap.min.js?v=' + new Date().getTime() + '"><\/script>');
      document.write('<script src="./plugins/iCheck/icheck.min.js?v=' + new Date().getTime() + '"><\/script>');
      document.write('<script src="./js/pages/login.js?v=' + new Date().getTime() + '"><\/script>');
      document.write('<script src="./plugins/toastr/toastr.min.js?v=' + new Date().getTime() + '"><\/script>');
    </script>

    <!--[if lt IE 9]>
    <script src="https://oss.maxcdn.com/html5shiv/3.7.3/html5shiv.min.js"></script>
    <script src="https://oss.maxcdn.com/respond/1.4.2/respond.min.js"></script>
    <![endif]-->
  </head>
  <body class="hold-transition overlay-wrapper login-page">
    <div class="login-box ng-cloak">       
      <div class="login-left-img">
        <img>
      </div>
      <div class="login-box-body">
        <form id="loginForm"  ng-if="if_Login0 && !isShowLock && !isShowActivateRobot">
          <!-- 姓名 -->
          <input type="text" ng-model="$parent.userName" class="form-control" autocomplete="off" placeholder="{{userNameText}}" required>
          <!-- 密码 -->
          <input type="password" ng-model="$parent.password" class="form-control" autocomplete="new-password" placeholder="{{passwordText}}" required>
          <button type="button" name="login" id="btnLogin" ng-click="login()" class="btn btn-primary"><span ng-bind="btnLoginText"></span></button>
          <a name="loginTips" ng-click="forgetPassword()" ng-bind="forgetPasswordText"></a>
        </form>
        <form id="loginFormCustom1" ng-if="if_Login1 && !isShowLock && !isShowActivateRobot">
          <!-- 工号 -->
          <input type="text" ng-model="$parent.userID" class="form-control" placeholder="{{userIDText}}" required readonly>
          <!-- 姓名 -->
          <input type="text" ng-model="$parent.userName" class="form-control" placeholder="{{peopleNameText}}" required readonly>
          <!-- 职能 -->
          <input type="text" ng-model="$parent.authorityName" class="form-control" placeholder="{{authorityText}}" required readonly>
          <button type="button" name="login" id="btnLogin" ng-click="login()" class="btn btn-primary"><span ng-bind="btnLoginText"></span></button>
          <a name="loginTips" ng-bind="idCardLoginText"></a>
        </form>
        <form id="unlockForm"  ng-if="isShowLock && !isShowActivateRobot">
          <!-- 解锁密码 -->
          <input type="password" ng-model="$parent.unlockWord" class="form-control" autocomplete="new-password" placeholder="{{unlockText}}" required>
          <button type="button" name="unlock" id="btnUnlock" ng-click="unlock()" class="btn btn-primary">
            <span ng-bind="btnUnlockText"></span>
          </button>
          <a name="unlockTips" ng-bind="unlockTipsText"></a>
        </form>
        <form id="loginForm" ng-if="isShowActivateRobot">
          <!-- SN码 -->
          <input type="password" ng-model="activateRobotMessage" placeholder="{{controlBoxText}}" class="form-control" required>
          <button type="button" class="btn btn-primary margin-bottom-4" name="login" id="btnActivateRobot" ng-click="activateRobot(activateRobotMessage)"><span ng-bind="activeText"></span></button>
          <div class="info-tips" ng-bind="activeState"></div>
        </form>
      </div>
    </div>
    <div class="maintenance">
      <a type="button" class="a-btn-entrance" ng-click="enterMaintenance()" ng-hide="isClicked"></a>
      <div ng-show="isClicked">
        <input type="password" class="form-control" name="inputMaintenancePwd" ng-model="loginMaintenanceEntrancePwd">
        <button type="button" class="btn btn-frgrey" name="cancelMaintenancePwd" ng-bind="cancelText" ng-click="verifyLoginSwitchPwd(0)"></button>
        <button type="button" class="btn btn-primary" name="verifyMaintenancePwd" ng-bind="verifyText" ng-click="verifyLoginSwitchPwd(1, loginMaintenanceEntrancePwd)"></button>
      </div>
    </div>
    <div class="setting-lang">
      <a class="dropdown-toggle fricon-font" data-toggle="dropdown">
        <i class="fa fa-globe" aria-hidden="true"></i>
        <span ng-bind="language"></span>
      </a>
      <ul class="dropdown-menu">
        <li class="header d-flex align-items-center" ng-click="setLanguage(value)" ng-repeat="(key, value) in langDict">
          <span class="lang-key">{{key.toUpperCase()}}</span>
          <span class="lang-name">{{value.lang_name}}</span>
        </li>
      </ul>
    </div>
    <div class="overlay" ng-show="showPendantTip">
      <div class="overlay-content w-full h-full d-flex justify-content-center align-items-center">
        <div class="d-flex d-flex-wrap align-items-center justify-content-center text-center update-content">
          <div class="tip">
            <i class="fa fa-exclamation-circle"></i>
            <span ng-bind="pendantTip"></span>
          </div>
        </div>
      </div>
    </div>
  </body>
  <script type="text/javascript">
    $("img").attr("src","./file/odm/login.jpg?v=" + new Date().getTime());
  </script>
</html>
