name: software-check

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

jobs:
  software-check:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Python test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pytest python3-yaml

      - name: Run repository software checks
        run: |
          python3 scripts/check_path_hardcodes.py
          python3 scripts/check_readme_coverage.py
          /usr/bin/python3 -m pytest -q tests/unit tests/integration
